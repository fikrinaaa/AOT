---
# ============================================================
#  Role: docker
#  Install Docker Engine + Docker Compose Plugin
#  Target: Ubuntu 22.04 (Vagrant box ubuntu/jammy64)
# ============================================================

- name: Pastikan dependensi Docker tersedia
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Buat direktori /etc/apt/keyrings
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Tambahkan Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: true

- name: Tambahkan Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker CE dan plugin Compose
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Install library Python untuk Docker
  ansible.builtin.pip:
    name:
      - docker
      - docker-compose
    state: present
    executable: pip3

- name: Aktifkan dan start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Tambahkan user vagrant ke group docker
  ansible.builtin.user:
    name: vagrant
    groups: docker
    append: true

- name: Verifikasi Docker terinstall
  ansible.builtin.command: docker --version
  register: docker_ver
  changed_when: false

- name: Tampilkan versi Docker
  ansible.builtin.debug:
    msg: "{{ docker_ver.stdout }}"
