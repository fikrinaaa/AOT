---
# ============================================================
#  Role: shuffle
#  Deploy Shuffle SOAR via Docker Compose
# ============================================================

- name: Clone Shuffle repository (main branch)
  ansible.builtin.git:
    repo: https://github.com/Shuffle/Shuffle.git
    dest: /opt/Shuffle
    version: main
    force: true

- name: Bersihkan shuffle-database agar inisialisasi OpenSearch bersih
  ansible.builtin.file:
    path: /opt/Shuffle/shuffle-database
    state: "{{ item }}"
    owner: "1000"
    group: "1000"
    mode: '0755'
  loop:
    - absent
    - directory

- name: Set OPENSEARCH_INITIAL_ADMIN_PASSWORD di .env
  ansible.builtin.replace:
    path: /opt/Shuffle/.env
    regexp: '^OPENSEARCH_INITIAL_ADMIN_PASSWORD=.*'
    replace: 'OPENSEARCH_INITIAL_ADMIN_PASSWORD="{{ shuffle_opensearch_password }}"'

- name: Set SHUFFLE_OPENSEARCH_PASSWORD di .env
  ansible.builtin.replace:
    path: /opt/Shuffle/.env
    regexp: '^SHUFFLE_OPENSEARCH_PASSWORD=.*'
    replace: 'SHUFFLE_OPENSEARCH_PASSWORD="{{ shuffle_opensearch_password }}"'

- name: Kurangi heap OpenSearch agar tidak OOM (maks 1500MB)
  ansible.builtin.replace:
    path: /opt/Shuffle/docker-compose.yml
    regexp: '- OPENSEARCH_JAVA_OPTS=.*'
    replace: '- OPENSEARCH_JAVA_OPTS=-Xms1500m -Xmx1500m'

- name: Pull dan jalankan Shuffle
  community.docker.docker_compose_v2:
    project_src: /opt/Shuffle
    state: present
    pull: always

- name: Tunggu Shuffle siap (port 3443)
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: 3443
    delay: 30
    timeout: 360
    state: started

- name: Info akses Shuffle
  ansible.builtin.debug:
    msg:
      - "Shuffle UI : https://{{ shuffle_ip }}:3443"
      - "Buat akun admin saat akses pertama via browser"
